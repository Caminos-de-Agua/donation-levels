<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Your Gift Does — Caminos de Agua</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
      color: #253489;
      padding: 2rem 1rem 3rem;
      max-width: 680px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #253489;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .header p {
      font-size: 0.95rem;
      color: #555;
      font-weight: 400;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .tier {
      border: 1.5px solid #e0e4f0;
      border-radius: 14px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .tier:hover {
      border-color: #35abbd;
    }

    .tier-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      background: #ffffff;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .tier-photo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2.5px solid #253489;
    }

    .tier-meta {
      flex: 1;
      min-width: 0;
    }

    .tier-amount {
      font-size: 1.25rem;
      font-weight: 700;
      color: #253489;
      line-height: 1.2;
    }

    .tier-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: #35abbd;
      margin-top: 0.2rem;
      line-height: 1.4;
    }

    .tier-toggle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f0f3fa;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }

    .tier-toggle svg {
      width: 14px;
      height: 14px;
      stroke: #253489;
      stroke-width: 2.5;
      fill: none;
      transition: transform 0.25s;
    }

    .tier.open .tier-toggle {
      background: #253489;
    }

    .tier.open .tier-toggle svg {
      stroke: #ffffff;
      transform: rotate(180deg);
    }

    .tier-body {
      display: none;
      padding: 0 1.25rem 1.25rem;
      border-top: 1px solid #e0e4f0;
    }

    .tier.open .tier-body {
      display: block;
    }

    .tier-body-inner {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      padding-top: 1rem;
    }

    .tier-body-photo {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid #e0e4f0;
    }

    .tier-body-text {
      flex: 1;
      min-width: 0;
    }

    .tier-body-text p {
      font-size: 0.9rem;
      color: #333;
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .donate-btn {
      display: inline-block;
      background: #35abbd;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.6rem 1.4rem;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .donate-btn:hover {
      background: #1180ad;
    }

    .footer-cta {
      text-align: center;
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid #e0e4f0;
    }

    .footer-cta p {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .footer-cta a {
      display: inline-block;
      background: #253489;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      text-decoration: none;
    }

    .footer-cta a:hover {
      background: #1a256b;
    }

    @media (max-width: 480px) {
      .tier-body-inner {
        flex-direction: column;
      }
      .tier-body-photo {
        width: 100%;
        height: 160px;
      }
      .header h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>What your gift does</h1>
    <p>Every dollar goes directly to clean water access for families in rural Guanajuato. Here's what each amount makes possible.</p>
  </div>

  <div id="tiers"></div>

  <div class="footer-cta">
    <p>Ready to give? You can also donate any amount at our giving page.</p>
    <a href="https://caminos-de-agua.givecloud.co/fundraising/forms/8NDR96EK" target="_blank" rel="noopener">Donate now</a>
  </div>

  <script>
    const DONATE_URL = 'https://caminos-de-agua.givecloud.co/fundraising/forms/8NDR96EK';

    const tiers = [
      {
        amount: 'USD $1,400',
        title: 'Fully funds a complete Rainwater Harvesting System',
        image: 'Im%C3%A1genes%20Metas%20Donaci%C3%B3n%20Sitio%20Web_1400.png',
        description: 'A gift of $1,400 fully funds a complete Rainwater Harvesting System for one family — roof catchment, gutters, first-flush diverter, storage cistern, and a point-of-use water filter. Rainwater is naturally free of arsenic and fluoride, making it one of the most effective safe-water solutions in the region. A family that builds this system is building something that will serve them, and their children, for generations.'
      },
      {
        amount: 'USD $800',
        title: 'Covers the cistern in a Rainwater Harvesting System',
        image: 'Im%C3%A1genes%20Metas%20Donaci%C3%B3n%20Sitio%20Web_800.png',
        description: "The cistern is the heart of a rainwater harvesting system — the central storage tank that holds a family's clean water through the dry season, when there is no rain to collect and groundwater is the only alternative. A gift of $800 covers the cistern in full, giving one family the ability to store enough safe water to last from one rainy season to the next."
      },
      {
        amount: 'USD $500',
        title: 'Equips a roof to capture and filter rainwater safely',
        image: 'Im%C3%A1genes%20Metas%20Donaci%C3%B3n%20Sitio%20Web_500.png',
        description: "Before rainwater can reach a cistern, a roof needs the right infrastructure to capture it safely. A gift of $500 equips a family's roof with everything needed — gutters, fittings, a first-flush diverter to discard the initial flow, and a point-of-use water filter. It's the part of the system that transforms a roof into a water source."
      },
      {
        amount: 'USD $250',
        title: 'Brings one family into Nuestra Agua',
        image: 'Im%C3%A1genes%20Metas%20Donaci%C3%B3n%20Sitio%20Web_250.png',
        description: "Nuestra Agua is Caminos de Agua's community water treatment program, designed for families whose wells contain dangerous levels of arsenic and fluoride — contaminants that can't be removed by boiling or most household filters. A gift of $250 covers the full cost of bringing one family into the program, including system construction, operator training, and the committee support that keeps the system running. It's a lifetime connection to safe drinking water."
      },
      {
        amount: 'USD $100',
        title: 'Sponsors a community health workshop',
        image: 'Im%C3%A1genes%20Metas%20Donaci%C3%B3n%20Sitio%20Web_100.png',
        description: "In many communities we work with, families have been drinking contaminated water for years without knowing it. Arsenic and fluoride have no color, no taste, no smell. A gift of $100 sponsors a community health workshop where families learn — often for the first time — what is actually in their water, what it means for their health, and what they can do about it. Understanding the problem is the first step toward solving it."
      },
      {
        amount: 'USD $50',
        title: 'Provides a water filter for a family using rainwater harvesting',
        image: 'Im%C3%A1genes%20Metas%20Donaci%C3%B3n%20Sitio%20Web_50.png',
        description: "For families already using rainwater harvesting, a point-of-use water filter is what makes the water safe to drink. A gift of $50 provides one ceramic water filter, removing bacteria and pathogens from harvested rainwater and delivering safe drinking water at home for the next three years. Simple, proven, and effective."
      }
    ];

    const container = document.getElementById('tiers');

    tiers.forEach((tier) => {
      const div = document.createElement('div');
      div.className = 'tier';

      div.innerHTML = `
        <div class="tier-header" role="button" aria-expanded="false" tabindex="0">
          <img class="tier-photo" src="${tier.image}" alt="${tier.amount}" />
          <div class="tier-meta">
            <div class="tier-amount">${tier.amount}</div>
            <div class="tier-title">${tier.title}</div>
          </div>
          <button class="tier-toggle" aria-label="Expand" tabindex="-1">
            <svg viewBox="0 0 16 16"><polyline points="3,5 8,11 13,5"/></svg>
          </button>
        </div>
        <div class="tier-body">
          <div class="tier-body-inner">
            <img class="tier-body-photo" src="${tier.image}" alt="" aria-hidden="true" />
            <div class="tier-body-text">
              <p>${tier.description}</p>
              <a class="donate-btn" href="${DONATE_URL}" target="_blank" rel="noopener">Give ${tier.amount}</a>
            </div>
          </div>
        </div>
      `;

      const header = div.querySelector('.tier-header');
      const toggle = () => {
        const isOpen = div.classList.toggle('open');
        header.setAttribute('aria-expanded', isOpen);
      };

      header.addEventListener('click', toggle);
      header.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
      });

      container.appendChild(div);
    });
  </script>

</body>
</html>
