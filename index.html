<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Your Gift Does | Caminos de Agua</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
      padding: 2rem 1rem 3rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #253489;
      margin-bottom: 0.4rem;
    }

    .header p {
      font-size: 0.9rem;
      color: #555;
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 340px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      border: 1.5px solid #e0e4f0;
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #35abbd;
    }

    .card-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .card-bottom {
      padding: 0.85rem 1rem;
      text-align: center;
    }

    .card-amount {
      font-size: 0.78rem;
      font-weight: 600;
      color: #35abbd;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 400;
      color: #253489;
      line-height: 1.5;
      margin-bottom: 0.6rem;
    }

    .card-title strong {
      font-weight: 700;
    }

    .card-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: none;
      border: none;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    .card-toggle-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #35abbd;
    }

    .card-toggle-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f0f3fa;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .card-toggle-icon svg {
      width: 10px;
      height: 10px;
      stroke: #253489;
      stroke-width: 2.5;
      fill: none;
      transition: transform 0.25s;
    }

    .card.open .card-toggle-icon {
      background: #253489;
    }

    .card.open .card-toggle-icon svg {
      stroke: #fff;
      transform: rotate(180deg);
    }

    .card.open .card-toggle-label {
      color: #253489;
    }

    .card-description {
      display: none;
      font-size: 0.83rem;
      color: #333;
      line-height: 1.7;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #e0e4f0;
      text-align: center;
    }

    .card.open .card-description {
      display: block;
    }

    .donate-btn {
      display: inline-block;
      margin-top: 0.85rem;
      background: #35abbd;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .donate-btn:hover {
      background: #1180ad;
    }

    .footer-cta {
      text-align: center;
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid #e0e4f0;
    }

    .footer-cta p {
      font-size: 0.88rem;
      color: #555;
      margin-bottom: 0.9rem;
      line-height: 1.6;
    }

    .footer-cta a {
      display: inline-block;
      background: #253489;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 0.7rem 1.9rem;
      border-radius: 50px;
      text-decoration: none;
    }

    .footer-cta a:hover {
      background: #1a256b;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>What your gift does</h1>
    <p>Every dollar goes directly to clean water access for families in rural Guanajuato.</p>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer-cta">
    <p>You can also donate any amount at our giving page.</p>
    <a href="https://caminos-de-agua.givecloud.co/fundraising/forms/8NDR96EK" target="_blank" rel="noopener">Donate now</a>
  </div>

  <script>
    const DONATE_URL = 'https://caminos-de-agua.givecloud.co/fundraising/forms/8NDR96EK';

    const tiers = [
      {
        amount: 'USD $1,400',
        title: 'Fully funds a <strong>complete rainwater harvesting system.</strong>',
        image: '1400.png',
        description: 'This gift fully funds a complete Rainwater Harvesting System for one family: roof catchment, gutters, first-flush diverter, storage cistern, and a point-of-use water filter. Rainwater is naturally free of arsenic and fluoride, making it one of the most effective safe-water solutions in the region. A family that builds this system is building something that will serve them, and their children, for generations.'
      },
      {
        amount: 'USD $800',
        title: 'Covers the cost of a <strong>cistern for a rainwater harvesting system.</strong>',
        image: '800.png',
        description: "The cistern is the heart of a rainwater harvesting system: the central storage tank that holds a family's clean water through the dry season. This gift covers the cistern in full, giving one family the ability to store enough safe water to last from one rainy season to the next."
      },
      {
        amount: 'USD $500',
        title: "Equips a family's roof with everything needed to <strong>capture and filter rainwater.</strong>",
        image: '500.png',
        description: "This gift equips a family's roof with everything needed to capture rainwater safely: gutters, fittings, a first-flush diverter, and a point-of-use water filter. It's the part of the system that transforms a roof into a water source."
      },
      {
        amount: 'USD $250',
        title: 'Covers our full cost to bring <strong>one family into Nuestra Agua,</strong> our community water treatment program.',
        image: '250.png',
        description: "Nuestra Agua is our community-scale water treatment program, built for families whose wells contain dangerous levels of arsenic and fluoride. We subsidize everything it takes to get a system running: construction, installation, community organizing, and operator training. This gift covers our cost per family, roughly $50 per person, or $250 for a family of five. Once a system is running, the community operates it themselves, covering ongoing costs through small household water fees. The goal is for each system to be fully self-sustaining within two to three years."
      },
      {
        amount: 'USD $100',
        title: 'Sponsors a <strong>community health workshop.</strong>',
        image: '100.png',
        description: "In many communities we work with, families have been drinking contaminated water for years without knowing it. Arsenic and fluoride have no color, no taste, no smell. This gift sponsors a community health workshop where families learn, often for the first time, what is actually in their water, what it means for their health, and what they can do about it."
      },
      {
        amount: 'USD $50',
        title: 'Provides a <strong>water filter</strong> for a family.',
        image: '50.png',
        description: "This gift provides one ceramic water filter, removing bacteria and pathogens from harvested rainwater and delivering safe drinking water at home for the next three years. Simple, proven, and effective."
      }
    ];

    const grid = document.getElementById('grid');

    tiers.forEach((tier) => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <a href="${DONATE_URL}" target="_blank" rel="noopener"><img class="card-image" src="${tier.image}" alt="${tier.amount}" style="cursor:pointer;" /></a>
        <div class="card-bottom">
          <div class="card-title">${tier.title}</div>
          <button class="card-toggle" aria-expanded="false">
            <span class="card-toggle-label">Learn more</span>
            <span class="card-toggle-icon">
              <svg viewBox="0 0 12 12"><polyline points="2,3 6,9 10,3"/></svg>
            </span>
          </button>
          <div class="card-description">
            <p>${tier.description}</p>
            <a class="donate-btn" href="${DONATE_URL}" target="_blank" rel="noopener">Give ${tier.amount}</a>
          </div>
        </div>
      `;

      const toggle = card.querySelector('.card-toggle');
      const label = card.querySelector('.card-toggle-label');

      toggle.addEventListener('click', () => {
        const isOpen = card.classList.toggle('open');
        toggle.setAttribute('aria-expanded', isOpen);
        label.textContent = isOpen ? 'Show less' : 'Learn more';
      });

      grid.appendChild(card);
    });
  </script>

</body>
</html>
